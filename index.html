<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tela de Início e Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0d6efd, #6ea8fe);
    }

    .inicio-box {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <div class="inicio-box">
    <h1 class="mb-3">Bem-vindo</h1>
    <p class="mb-4">Clique abaixo para fazer login</p>

    <button type="button" class="btn btn-primary btn-lg" data-bs-toggle="modal" data-bs-target="#modalLogin">
      Acesse sua conta
    </button>
  </div>

  <div class="modal fade" id="modalLogin" tabindex="-1" aria-labelledby="tituloModalLogin" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title" id="tituloModalLogin">Login do Sistema</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>

        <div class="modal-body">
          <form id="formLogin">
            <div class="mb-3">
              <label for="usuario" class="form-label">Usuário</label>
              <input type="text" id="usuario" class="form-control" placeholder="Digite seu usuário">
            </div>

            <div class="mb-3">
              <label for="senha" class="form-label">Senha</label>
              <input type="password" id="senha" class="form-control" placeholder="Digite sua senha">
            </div>

            <button type="submit" class="btn btn-primary w-100">Entrar</button>

            <p id="mensagem" class="mt-3 text-center fw-bold"></p>
          </form>
        </div>

      </div>
    </div>
  </div>

  <div class="modal fade" id="modalSucesso" tabindex="-1" aria-labelledby="tituloModalSucesso" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title" id="tituloModalSucesso">Sucesso</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>

        <div class="modal-body text-center">
          <p class="fs-5 mb-0">Parabéns, você lembrou sua senha!</p>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-success w-100" data-bs-dismiss="modal">Continuar</button>
        </div>

      </div>
    </div>
  </div>

  <script>
    localStorage.setItem("usuarioCadastrado", "augusto");
    localStorage.setItem("senhaCadastrada", "123456");

    const form = document.getElementById("formLogin");
    const mensagem = document.getElementById("mensagem");

    form.addEventListener("submit", function(event) {
      event.preventDefault();

      const usuarioDigitado = document.getElementById("usuario").value.trim();
      const senhaDigitada = document.getElementById("senha").value.trim();

      const usuarioSalvo = localStorage.getItem("usuarioCadastrado");
      const senhaSalva = localStorage.getItem("senhaCadastrada");

      if (usuarioDigitado === "" || senhaDigitada === "") {
        mensagem.textContent = "Preencha todos os campos.";
        mensagem.className = "mt-3 text-center fw-bold text-danger";
        return;
      }

      if (usuarioDigitado === usuarioSalvo && senhaDigitada === senhaSalva) {
        mensagem.textContent = "Login realizado com sucesso!";
        mensagem.className = "mt-3 text-center fw-bold text-success";

        const modalLogin = bootstrap.Modal.getInstance(document.getElementById("modalLogin"));
        modalLogin.hide();

        setTimeout(() => {
          const modalSucesso = new bootstrap.Modal(document.getElementById("modalSucesso"));
          modalSucesso.show();
        }, 500);

      } else {
        mensagem.textContent = "Usuário ou senha incorretos.";
        mensagem.className = "mt-3 text-center fw-bold text-danger";
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
