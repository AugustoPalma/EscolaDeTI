<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestão de Hardware</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>

  <style>
    :root {
      --green-deep: #1a3a2a;
      --green-mid:  #2d6a4f;
      --green-bright: #52b788;
      --green-light: #b7e4c7;
      --accent: #f4a261;
      --bg: #f0f7f2;
      --card-bg: #ffffff;
      --text-main: #1a2e22;
      --text-muted: #6b8c78;
      --border: #d8eddf;
      --mono: 'Space Mono', monospace;
    }

    body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text-main); }

    .topbar { background: var(--green-deep); padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; }
    .brand { font-family: var(--mono); color: var(--green-light); font-size: .8rem; letter-spacing: .1em; text-transform: uppercase; }
    
    .page-header {
      background: linear-gradient(135deg, var(--green-mid) 0%, var(--green-deep) 100%);
      padding: 40px 24px;
      color: #fff;
    }
    .page-header h1 { font-family: var(--mono); font-size: 1.4rem; margin: 0; }
    .page-header p { color: var(--green-light); font-size: .9rem; opacity: 0.8; }

    .main-wrap { max-width: 1000px; margin: -30px auto 60px; padding: 0 20px; }
    
    .section-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(26,58,42,.08);
      margin-bottom: 24px;
    }

    .section-title {
      font-family: var(--mono);
      font-size: .75rem;
      text-transform: uppercase;
      color: var(--green-mid);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .form-control-custom {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      margin-bottom: 15px;
      font-weight: 500;
    }
    .form-control-custom:focus { outline: none; border-color: var(--green-bright); background: #fff; }
    label { font-size: .8rem; color: var(--text-muted); margin-bottom: 5px; display: block; }

    .offer-item {
      display: flex;
      align-items: center;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 12px;
      background: #fff;
      transition: 0.2s;
    }
    
    .status-badge {
      font-family: var(--mono);
      font-size: .6rem;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .status-pendente { background: #fff7ed; color: #c2410c; border: 1px solid #fdba74; }
    .status-triado { background: #f0fdf4; color: #15803d; border: 1px solid #86efac; }

    .btn-eco {
      background: var(--green-mid);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      width: 100%;
      letter-spacing: 1px;
    }
    .btn-eco:hover { background: var(--green-deep); }

    .btn-triagem {
      background: var(--accent);
      color: var(--green-deep);
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: .75rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-triagem:hover { background: #e8914d; }

    .info-box {
      background: #fef3c7;
      border: 1px dashed var(--accent);
      padding: 10px;
      border-radius: 8px;
      font-size: .72rem;
      color: #92400e;
      margin-top: 10px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-delete {
      color: #dc3545;
      background: none;
      border: none;
      font-size: 1.1rem;
      padding: 5px;
      transition: opacity 0.2s;
      cursor: pointer;
    }
    .btn-delete:hover { opacity: 0.6; }
  </style>
</head>
<body>

<div class="topbar">
  <span class="brand">UC 03 - PUBLICAR OFERTA | UC 04 - REALIZAR TRIAGEM DE HARDWARE</span>
  <span class="uc-badge" style="background:var(--green-mid); color:#fff; font-size:.65rem; padding:3px 12px; border-radius:20px; font-family:var(--mono);">Painel de Controle</span>
</div>

<div class="page-header">
  <h1>Inventário de Hardware</h1>
  <p>Registro e validação de componentes</p>
</div>

<div class="main-wrap">
  <div class="row">
    <div class="col-lg-5">
      <div class="section-card">
        <div class="section-title">Publicar Hardware</div>
        
        <label>Nome do Equipamento</label>
        <input type="text" id="nomeHardware" class="form-control-custom" placeholder="Ex: Monitor LCD 19'">

        <label>Categoria</label>
        <select id="catHardware" class="form-control-custom">
          <option value="Monitores">Monitores</option>
          <option value="Placas-Mãe">Placas-Mãe</option>
          <option value="Processadores">Processadores</option>
          <option value="Periféricos">Periféricos</option>
          <option value="Laptops">Laptops</option>
        </select>

        <label>Quantidade</label>
        <input type="number" id="qtdHardware" class="form-control-custom" placeholder="0">

        <button class="btn-eco" onclick="publicarHardware()">
          <i class="bi bi-plus-circle-fill me-2"></i> REGISTRAR
        </button>
      </div>

      <div class="section-card" style="background: var(--green-deep); color: white;">
        <div class="section-title" style="color: var(--green-light);">Peso Total Triado</div>
        <div class="d-flex align-items-end gap-2">
            <h2 id="totalWeight" style="color:var(--green-bright); margin:0; font-family:var(--mono);">0.0</h2>
            <span style="padding-bottom: 5px; opacity: 0.7;">kg</span>
        </div>
      </div>
    </div>

    <div class="col-lg-7">
      <div class="section-card">
        <div class="section-title">Triagem e Validação</div>
        <div id="listaHardware">
             <p id="msgVazio" style="text-align:center; color:var(--text-muted); padding:40px;">
                <i class="bi bi-box-seam d-block mb-2" style="font-size:2rem; opacity:0.3;"></i>
                Aguardando itens.
             </p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let hardwareDB = JSON.parse(localStorage.getItem('hardware_data')) || [];

  function salvarDados() {
    localStorage.setItem('hardware_data', JSON.stringify(hardwareDB));
    atualizarTela();
  }

  function publicarHardware() {
    const nome = document.getElementById('nomeHardware').value;
    const cat = document.getElementById('catHardware').value;
    const qtd = document.getElementById('qtdHardware').value;

    if(!nome || !qtd) { alert("Preencha todos os campos."); return; }

    const item = {
      id: Date.now(),
      nome: nome,
      categoria: cat,
      qtd: parseInt(qtd),
      status: 'pendente'
    };

    hardwareDB.push(item);
    document.getElementById('nomeHardware').value = '';
    document.getElementById('qtdHardware').value = '';
    salvarDados();
  }

  function executarTriagem(id) {
    const alvo = hardwareDB.find(h => h.id === id);
    if(alvo) {
      alvo.status = 'triado';
      salvarDados();
    }
  }

  function removerHardware(id) {
    if(confirm("Deseja realmente excluir este item do inventário?")) {
      hardwareDB = hardwareDB.filter(h => h.id !== id);
      salvarDados();
    }
  }

  function atualizarTela() {
    const container = document.getElementById('listaHardware');
    container.innerHTML = ''; 

    if(hardwareDB.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:var(--text-muted); padding:40px;">Aguardando itens.</p>';
        return;
    }

    let pesoTotal = 0;

    hardwareDB.forEach(h => {
      const isTriado = h.status === 'triado';
      if(isTriado) pesoTotal += (h.qtd * 0.8);

      const htmlCard = `
        <div class="offer-item">
          <div class="flex-grow-1">
            <div class="d-flex justify-content-between">
                <span class="status-badge status-${h.status}">${h.status}</span>
                <span style="font-size: .65rem; font-family: var(--mono); color: var(--text-muted);">REF-${h.id.toString().slice(-5)}</span>
            </div>
            <h6 style="margin:6px 0 2px 0; font-weight:700;">${h.nome}</h6>
            <div style="font-size: .75rem; color: var(--text-muted);">
                ${h.categoria} • ${h.qtd} un.
            </div>

            ${isTriado ? `
                <div class="info-box">
                    <i class="bi bi-check-circle"></i> 
                    Item triado e validado.
                </div>
            ` : ''}
          </div>
          
          <div class="ms-3 d-flex align-items-center gap-2">
            ${!isTriado ? 
                `<button class="btn-triagem" onclick="executarTriagem(${h.id})">TRIAR</button>` : 
                `<i class="bi bi-check-all text-success" style="font-size:1.8rem;"></i>`
            }
            <button class="btn-delete" onclick="removerHardware(${h.id})" title="Excluir item">
                <i class="bi bi-trash3"></i>
            </button>
          </div>
        </div>
      `;
      container.innerHTML += htmlCard;
    });

    document.getElementById('totalWeight').innerText = pesoTotal.toFixed(1);
  }

  atualizarTela();
</script>

</body>
</html>
